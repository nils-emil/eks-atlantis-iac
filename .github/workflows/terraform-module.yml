name: terraform-module

on:
  workflow_call:
    inputs:
      module:
        description: Module directory name under terraform/ (vpc, eks, atlantis)
        required: true
        type: string
      destroy:
        description: Run terraform destroy instead of plan/apply
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
      TF_IN_AUTOMATION: "true"
      TF_VAR_region: ${{ vars.AWS_REGION }}
      TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_lock_table: ${{ vars.TF_LOCK_TABLE }}
      TF_VAR_github_user: ${{ vars.ATLANTIS_GITHUB_USER }}
      TF_VAR_repo_allowlist: ${{ vars.ATLANTIS_REPO_ALLOWLIST }}
      TF_VAR_github_token: ${{ secrets.ATLANTIS_GITHUB_TOKEN }}
      TF_VAR_github_webhook_secret: ${{ secrets.ATLANTIS_GITHUB_WEBHOOK_SECRET }}
    defaults:
      run:
        working-directory: terraform/${{ inputs.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ inputs.module }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform format check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        if: ${{ !inputs.destroy && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: terraform apply -input=false -auto-approve

      - name: Terraform destroy
        if: ${{ inputs.destroy }}
        run: terraform destroy -input=false -auto-approve
